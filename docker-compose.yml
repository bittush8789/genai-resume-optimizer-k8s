version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-analyzer-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - db_data:/app/resume_analyzer.db
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: resume-analyzer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resumeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resumepassword}
      POSTGRES_DB: ${POSTGRES_DB:-resume_analyzer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
  postgres_data:
