apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resume-analyzer-ingress
  namespace: resume-analyzer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Uncomment for TLS with cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # Uncomment to enable HTTPS with cert-manager:
  # tls:
  #   - hosts:
  #       - resume-analyzer.yourdomain.com
  #     secretName: resume-analyzer-tls
  rules:
    - host: resume-analyzer.yourdomain.com   # ← replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resume-analyzer-service
                port:
                  number: 80
