apiVersion: v1
kind: Secret
metadata:
  name: resume-analyzer-secrets
  namespace: resume-analyzer
type: Opaque
# ⚠️  DO NOT commit real values here.
# Apply via: kubectl create secret generic resume-analyzer-secrets \
#   --from-literal=GEMINI_API_KEY=your_key \
#   --from-literal=SECRET_KEY=your_secret \
#   --from-literal=DATABASE_URL=postgresql://user:pass@db:5432/resume_analyzer \
#   -n resume-analyzer
stringData:
  GEMINI_API_KEY: "REPLACE_ME"
  SECRET_KEY: "REPLACE_ME"
  DATABASE_URL: "postgresql://resumeuser:resumepassword@postgres-service:5432/resume_analyzer"
