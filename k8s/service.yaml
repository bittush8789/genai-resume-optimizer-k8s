apiVersion: v1
kind: Service
metadata:
  name: resume-analyzer-service
  namespace: resume-analyzer
  labels:
    app: resume-analyzer
spec:
  selector:
    app: resume-analyzer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8501
  type: ClusterIP          # Exposed via Ingress below
