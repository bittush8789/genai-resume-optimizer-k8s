apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-analyzer
  namespace: resume-analyzer
  labels:
    app: resume-analyzer
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resume-analyzer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: resume-analyzer
    spec:
      containers:
        - name: resume-analyzer
          image: your-dockerhub/resume-analyzer:latest   # ← replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resume-analyzer-secrets
                  key: GEMINI_API_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: resume-analyzer-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: resume-analyzer-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 40
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      restartPolicy: Always
